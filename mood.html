<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心境手帖 · Mood Journal</title>
  <link rel="manifest" href="mood-manifest.json">
<meta name="theme-color" content="#FFF8F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="心境手帖">
<link rel="apple-touch-icon" href="mood-icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="mood-icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFF8F0;--bg-warm:#FFF3E6;--bg-card:#FFFFFF;--peach:#F4A683;--peach-light:#FCDCC8;--peach-pale:#FFF0E3;--rose:#E8889A;--rose-light:#F5BCC8;--lavender:#C4A8D8;--sky:#8DBDD8;--mint:#8DD8B4;--text:#5C4A3A;--text-light:#9B8B7A;--text-faint:#C8B8A8;--border:rgba(244,166,131,0.2);--shadow:rgba(92,74,58,0.06);--font-hand:'Caveat',cursive;--font-body:'Noto Serif SC','Songti SC',serif}*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(244,166,131,0.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(196,168,216,0.06) 0%,transparent 50%);pointer-events:none}header{text-align:center;padding:44px 24px 16px;position:relative;z-index:1}header h1{font-family:var(--font-hand);font-size:2.4rem;font-weight:500;color:var(--peach);letter-spacing:1px}header .subtitle{font-size:0.7rem;color:var(--text-faint);letter-spacing:4px;margin-top:2px}.tabs{display:flex;justify-content:center;gap:0;margin:20px auto;max-width:320px;background:var(--bg-warm);border-radius:24px;padding:3px;position:relative;z-index:1}.tab{flex:1;text-align:center;padding:9px 0;font-size:0.78rem;color:var(--text-light);cursor:pointer;border-radius:22px;transition:all 0.3s;letter-spacing:1px;border:none;background:none;font-family:var(--font-body)}.tab.active{background:var(--bg-card);color:var(--peach);box-shadow:0 2px 8px var(--shadow)}.page{display:none;max-width:440px;margin:0 auto;padding:0 20px 100px;position:relative;z-index:1}.page.active{display:block}.today-date{text-align:center;margin-bottom:28px}.today-date .date-big{font-family:var(--font-hand);font-size:3.2rem;font-weight:600;color:var(--peach);line-height:1}.today-date .date-info{font-size:0.72rem;color:var(--text-faint);margin-top:2px;letter-spacing:1px}.mood-question{text-align:center;font-size:0.85rem;color:var(--text-light);margin-bottom:16px}.mood-grid{display:flex;justify-content:center;gap:8px;margin-bottom:28px}.mood-btn{width:62px;height:78px;border:2px solid var(--border);border-radius:16px;background:var(--bg-card);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all 0.3s;box-shadow:0 2px 8px var(--shadow)}.mood-btn:hover{transform:translateY(-3px);box-shadow:0 6px 16px var(--shadow)}.mood-btn.selected{border-color:var(--peach);background:var(--peach-pale);box-shadow:0 4px 16px rgba(244,166,131,0.2)}.mood-btn .mood-face{font-size:0.85rem;line-height:1;color:var(--text);white-space:nowrap}.mood-btn .mood-label{font-size:0.55rem;color:var(--text-faint);letter-spacing:0.5px}.mood-btn.selected .mood-label{color:var(--peach)}.journal-area{margin-bottom:20px}.journal-area label{display:block;font-size:0.78rem;color:var(--text-light);margin-bottom:8px;letter-spacing:0.5px}.journal-area textarea{width:100%;height:96px;background:var(--bg-card);border:2px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-family:var(--font-body);font-size:0.85rem;line-height:1.8;resize:none;outline:none;transition:border-color 0.3s;box-shadow:0 2px 8px var(--shadow)}.journal-area textarea::placeholder{color:var(--text-faint)}.journal-area textarea:focus{border-color:var(--peach-light)}.save-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--peach),var(--rose-light));border:none;border-radius:14px;color:white;font-family:var(--font-body);font-size:0.85rem;font-weight:500;cursor:pointer;letter-spacing:2px;transition:all 0.3s;box-shadow:0 4px 16px rgba(244,166,131,0.25)}.save-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(244,166,131,0.35)}.save-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}.save-confirm{text-align:center;padding:40px 20px;display:none;animation:fadeUp 0.5s ease}.save-confirm.visible{display:block}.save-confirm .confirm-icon{font-size:1.6rem;margin-bottom:12px;color:var(--text)}.save-confirm .confirm-text{font-size:0.85rem;color:var(--text-light);line-height:1.8}.save-confirm .confirm-quote{font-family:var(--font-hand);font-size:1.1rem;color:var(--peach);margin-top:16px}.save-confirm .edit-btn{margin-top:20px;padding:8px 24px;background:none;border:1.5px solid var(--border);border-radius:20px;color:var(--text-light);font-family:var(--font-body);font-size:0.75rem;cursor:pointer;transition:all 0.3s;letter-spacing:1px}.save-confirm .edit-btn:hover{border-color:var(--peach-light);color:var(--peach)}.history-month-nav{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:24px}.month-nav-btn{background:var(--bg-card);border:1.5px solid var(--border);color:var(--text-light);font-size:0.9rem;cursor:pointer;padding:6px 12px;border-radius:12px;transition:all 0.3s;box-shadow:0 2px 6px var(--shadow)}.month-nav-btn:hover{color:var(--peach);border-color:var(--peach-light)}.month-label{font-family:var(--font-hand);font-size:1.2rem;color:var(--peach);min-width:130px;text-align:center}.calendar-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px}.calendar-weekdays span{font-size:0.6rem;color:var(--text-faint);letter-spacing:1px;padding:4px 0}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:28px}.calendar-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;font-size:0.72rem;color:var(--text-faint);cursor:default;transition:background 0.2s}.calendar-day.has-entry{cursor:pointer;background:var(--bg-card);box-shadow:0 1px 4px var(--shadow)}.calendar-day.has-entry:hover{background:var(--peach-pale)}.calendar-day.today{color:var(--peach);font-weight:500}.calendar-day .day-mood{font-size:0.5rem;line-height:1;color:var(--text)}.calendar-day .day-num{font-size:0.55rem;margin-top:1px}.entry-detail{background:var(--bg-card);border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;display:none;animation:fadeUp 0.4s ease;box-shadow:0 4px 16px var(--shadow)}.entry-detail.visible{display:block}.entry-detail .detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.entry-detail .detail-date{font-family:var(--font-hand);font-size:1rem;color:var(--peach)}.entry-detail .detail-mood{font-size:0.9rem;color:var(--text)}.entry-detail .detail-text{font-size:0.82rem;color:var(--text-light);line-height:1.8}.entry-detail .detail-close{text-align:center;margin-top:12px}.entry-detail .detail-close button{background:none;border:1.5px solid var(--border);color:var(--text-faint);font-family:var(--font-body);font-size:0.7rem;padding:4px 16px;border-radius:12px;cursor:pointer;transition:all 0.3s}.entry-detail .detail-close button:hover{border-color:var(--peach-light);color:var(--peach)}.stats-section{margin-bottom:28px}.stats-section h3{font-family:var(--font-hand);font-size:1.2rem;font-weight:500;color:var(--peach);margin-bottom:14px}.mood-stats-bar{display:flex;flex-direction:column;gap:10px;background:var(--bg-card);border-radius:16px;padding:16px;box-shadow:0 2px 10px var(--shadow)}.stat-row{display:flex;align-items:center;gap:10px}.stat-row .stat-emoji{font-size:0.7rem;width:60px;text-align:center;color:var(--text);white-space:nowrap}.stat-row .stat-bar-wrap{flex:1;height:10px;background:var(--bg-warm);border-radius:5px;overflow:hidden}.stat-row .stat-bar{height:100%;border-radius:5px;transition:width 0.6s ease}.stat-row .stat-count{font-size:0.72rem;color:var(--text-faint);min-width:20px;text-align:right}.streak-card{background:var(--bg-card);border-radius:16px;padding:24px;text-align:center;box-shadow:0 2px 10px var(--shadow)}.streak-number{font-family:var(--font-hand);font-size:3rem;color:var(--peach)}.streak-label{font-size:0.72rem;color:var(--text-faint);margin-top:2px}@keyframes fadeUp{0%{transform:translateY(12px);opacity:0}100%{transform:translateY(0);opacity:1}}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--peach-light);border-radius:2px}@media(max-width:380px){.mood-btn{width:54px;height:70px}.mood-btn .mood-face{font-size:0.75rem}header h1{font-size:2rem}.today-date .date-big{font-size:2.6rem}.mood-grid{gap:6px}}footer{text-align:center;padding:24px;color:var(--text-faint);letter-spacing:3px;font-family:var(--font-hand);font-size:0.8rem}
</style>
</head>
<body>
<header><h1>Mood Journal</h1><div class="subtitle">心 境 手 帖</div></header>
<div class="tabs"><button class="tab active" onclick="showPage('today')">Today</button><button class="tab" onclick="showPage('history')">History</button><button class="tab" onclick="showPage('stats')">Stats</button></div>
<div id="today" class="page active"><div class="today-date"><div class="date-big" id="todayDay"></div><div class="date-info" id="todayInfo"></div></div><div id="todayForm"><p class="mood-question">今天的心情是？</p><div class="mood-grid"><button class="mood-btn" data-mood="great" onclick="selectMood(this)"><span class="mood-face">(≧▽≦)</span><span class="mood-label">Great</span></button><button class="mood-btn" data-mood="good" onclick="selectMood(this)"><span class="mood-face">(◠‿◠)</span><span class="mood-label">Good</span></button><button class="mood-btn" data-mood="okay" onclick="selectMood(this)"><span class="mood-face">(´-ᴗ-`)</span><span class="mood-label">Okay</span></button><button class="mood-btn" data-mood="low" onclick="selectMood(this)"><span class="mood-face">(´·⌓·`)</span><span class="mood-label">Low</span></button><button class="mood-btn" data-mood="bad" onclick="selectMood(this)"><span class="mood-face">(´;ω;`)</span><span class="mood-label">Rough</span></button></div><div class="journal-area"><label>写一句话给今天 / a note for today</label><textarea id="journalText" placeholder="今天发生了什么值得记住的事呢..."></textarea></div><button class="save-btn" id="saveBtn" onclick="saveEntry()" disabled>记 录 · save</button></div><div class="save-confirm" id="saveConfirm"><div class="confirm-icon" id="confirmIcon"></div><div class="confirm-text">已记录今天的心情</div><div class="confirm-quote" id="confirmQuote"></div><button class="edit-btn" onclick="editToday()">修改 · edit</button></div></div>
<div id="history" class="page"><div class="history-month-nav"><button class="month-nav-btn" onclick="changeMonth(-1)">&lsaquo;</button><div class="month-label" id="monthLabel"></div><button class="month-nav-btn" onclick="changeMonth(1)">&rsaquo;</button></div><div class="entry-detail" id="entryDetail"><div class="detail-header"><span class="detail-date" id="detailDate"></span><span class="detail-mood" id="detailMood"></span></div><div class="detail-text" id="detailText"></div><div class="detail-close"><button onclick="closeDetail()">close</button></div></div><div class="calendar-weekdays"><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span></div><div class="calendar-grid" id="calendarGrid"></div></div>
<div id="stats" class="page"><div class="stats-section"><h3>Mood Overview</h3><div class="mood-stats-bar" id="moodStatsBar"></div></div><div class="stats-section"><h3>Streak</h3><div class="streak-card"><div class="streak-number" id="streakNumber">0</div><div class="streak-label">consecutive days / 连续记录</div></div></div><div class="stats-section"><h3>Total</h3><div class="streak-card"><div class="streak-number" id="totalEntries">0</div><div class="streak-label">entries / 总记录</div></div></div></div>
<footer>written with warmth · 温柔记事</footer>
<script>
const MOODS={great:{face:'(≧▽≦)',label:'Great',color:'#F4A683'},good:{face:'(◠‿◠)',label:'Good',color:'#8DD8B4'},okay:{face:'(´-ᴗ-`)',label:'Okay',color:'#8DBDD8'},low:{face:'(´·⌓·`)',label:'Low',color:'#C4A8D8'},bad:{face:'(´;ω;`)',label:'Rough',color:'#E8889A'}};
const QUOTES=["Today matters. ♡","此刻即永恒。","永远有下一个春天。","今天也辛苦了。","You showed up. That's enough.","记录本身就是温柔。","Breathe. You're here.","好好睡觉。","Tomorrow is another today.","(´-ᴗ-`) ♡"];
let selectedMood=null,viewMonth=new Date().getMonth(),viewYear=new Date().getFullYear();
function getEntries(){try{return JSON.parse(localStorage.getItem('mood_journal')||'{}')}catch{return{}}}
function saveToStorage(k,e){const entries=getEntries();entries[k]=e;localStorage.setItem('mood_journal',JSON.stringify(entries))}
function dateKey(d){const date=d||new Date();return`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`}
function initToday(){const n=new Date(),wd=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];document.getElementById('todayDay').textContent=n.getDate();document.getElementById('todayInfo').textContent=`${wd[n.getDay()]}, ${mo[n.getMonth()]} ${n.getFullYear()}`;const e=getEntries();if(e[dateKey()])showSavedState(e[dateKey()])}
function selectMood(btn){document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedMood=btn.dataset.mood;document.getElementById('saveBtn').disabled=false}
function saveEntry(){if(!selectedMood)return;const e={mood:selectedMood,text:document.getElementById('journalText').value.trim(),time:new Date().toISOString()};saveToStorage(dateKey(),e);showSavedState(e)}
function showSavedState(e){document.getElementById('todayForm').style.display='none';const c=document.getElementById('saveConfirm');c.classList.add('visible');document.getElementById('confirmIcon').textContent=MOODS[e.mood].face;document.getElementById('confirmQuote').textContent=QUOTES[Math.floor(Math.random()*QUOTES.length)]}
function editToday(){document.getElementById('todayForm').style.display='block';document.getElementById('saveConfirm').classList.remove('visible');const e=getEntries()[dateKey()];if(e){document.getElementById('journalText').value=e.text||'';const b=document.querySelector(`.mood-btn[data-mood="${e.mood}"]`);if(b)selectMood(b)}}
function renderCalendar(){const mn=['January','February','March','April','May','June','July','August','September','October','November','December'];document.getElementById('monthLabel').textContent=`${mn[viewMonth]} ${viewYear}`;const g=document.getElementById('calendarGrid');g.innerHTML='';const f=new Date(viewYear,viewMonth,1);let sd=f.getDay();sd=sd===0?6:sd-1;const dim=new Date(viewYear,viewMonth+1,0).getDate(),entries=getEntries(),today=new Date();for(let i=0;i<sd;i++){const c=document.createElement('div');c.className='calendar-day';g.appendChild(c)}for(let d=1;d<=dim;d++){const c=document.createElement('div');c.className='calendar-day';const date=new Date(viewYear,viewMonth,d),k=dateKey(date),e=entries[k];if(date.toDateString()===today.toDateString())c.classList.add('today');if(e){c.classList.add('has-entry');c.innerHTML=`<span class="day-mood">${MOODS[e.mood].face}</span><span class="day-num">${d}</span>`;c.onclick=()=>showEntryDetail(k,e)}else{c.innerHTML=`<span class="day-num" style="font-size:0.72rem">${d}</span>`}g.appendChild(c)}}
function changeMonth(d){viewMonth+=d;if(viewMonth>11){viewMonth=0;viewYear++}if(viewMonth<0){viewMonth=11;viewYear--}renderCalendar()}
function showEntryDetail(k,e){const p=document.getElementById('entryDetail'),[y,m,d]=k.split('-'),mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];document.getElementById('detailDate').textContent=`${mo[parseInt(m)-1]} ${parseInt(d)}, ${y}`;document.getElementById('detailMood').textContent=MOODS[e.mood].face;document.getElementById('detailText').textContent=e.text||'(no note)';p.classList.add('visible');p.scrollIntoView({behavior:'smooth',block:'start'})}
function closeDetail(){document.getElementById('entryDetail').classList.remove('visible')}
function renderStats(){const entries=getEntries(),keys=Object.keys(entries),counts={great:0,good:0,okay:0,low:0,bad:0};keys.forEach(k=>{if(entries[k].mood)counts[entries[k].mood]++});const mx=Math.max(...Object.values(counts),1),sb=document.getElementById('moodStatsBar');sb.innerHTML='';Object.keys(MOODS).forEach(m=>{const p=(counts[m]/mx)*100;sb.innerHTML+=`<div class="stat-row"><span class="stat-emoji">${MOODS[m].face}</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${p}%;background:${MOODS[m].color}"></div></div><span class="stat-count">${counts[m]}</span></div>`});document.getElementById('totalEntries').textContent=keys.length;let streak=0;const cd=new Date();while(getEntries()[dateKey(cd)]){streak++;cd.setDate(cd.getDate()-1)}document.getElementById('streakNumber').textContent=streak}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.classList.add('active');if(id==='history')renderCalendar();if(id==='stats')renderStats()}
initToday();
</script>
</body>
</html>
