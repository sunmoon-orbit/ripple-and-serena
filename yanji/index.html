<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>言叽</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#fdf7f6">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="言叽">
  <!-- Markdown 渲染 + 代码高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/xml.min.js"></script>
</head>
<body class="app-layout">
  
  <!-- 侧边栏 -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="app-logo">言叽</span>
      <button id="closeSidebarBtn" class="icon-btn" title="收起侧边栏">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
      </button>
    </div>
    
    <button id="newChatButton" class="new-chat-btn">+ 新对话</button>
    
    <div class="sidebar-search">
      <input id="chatSearchInput" type="text" placeholder="搜索对话...">
    </div>
    
    <div id="chatList" class="chat-list">
      <!-- 聊天列表动态渲染 -->
    </div>
    
    <div class="sidebar-footer">
      <a href="connections.html" class="sidebar-nav-item">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4l3 3-7 7-3-3 7-7z"/><path d="M14 1l3 3"/><path d="M1 14l3 3"/></svg>
        </span>
        <span>连接</span>
      </a>
      <a href="memory.html" class="sidebar-nav-item">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7"/><path d="M9 5v4l3 2"/></svg>
        </span>
        <span>记忆</span>
      </a>
      <a href="data.html" class="sidebar-nav-item">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12c0-2 1.5-3.5 3.5-3.5a3.5 3.5 0 0 1 3.4 2.8A2.5 2.5 0 1 1 13 14H4.5A1.5 1.5 0 0 1 3 12z"/></svg>
        </span>
        <span>数据</span>
      </a>
    </div>
  </aside>
  
  <!-- 主区域 -->
  <main class="main-area">
    <!-- 顶部栏 -->
    <header class="chat-header">
      <button id="openSidebarBtn" class="icon-btn hamburger" title="展开侧边栏">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg>
      </button>
      <div class="chat-header-info">
        <span id="currentChatTitle" class="chat-title">新的闲聊</span>
        <span id="currentConnectionName" class="connection-badge"></span>
      </div>
      <div class="chat-header-actions">
        <button id="switchModelBtn" class="icon-btn" title="切换模型">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
        </button>
      </div>
    </header>
    
    <!-- 模型切换面板 -->
    <div id="modelSwitchPanel" class="model-switch-panel hidden">
      <div class="model-switch-content">
        <div class="model-switch-header">
          <span>切换模型</span>
          <button id="closeModelPanel" class="icon-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
          </button>
        </div>
        
        <div class="model-switch-section">
          <label>选择连接</label>
          <select id="connectionSelect"></select>
        </div>
        
        <div class="model-switch-section">
          <label>选择模型</label>
          <div id="modelList" class="model-list">
            <!-- 模型列表动态渲染 -->
          </div>
        </div>
        
        <div class="model-switch-section">
          <label>自定义模型</label>
          <div class="custom-model-row">
            <input id="activeModelInput" type="text" placeholder="输入模型名称...">
            <button id="applyCustomModel" class="secondary-button">应用</button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 消息区域 -->
    <div id="messagesContainer" class="messages-container">
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">✦</div>
        <h2>今天想聊点什么？</h2>
        <p>选择连接和模型，然后把想法交给言叽。</p>
      </div>
    </div>
    
    <!-- 输入区域 -->
    <div class="input-area">
      <!-- 图片预览 -->
      <div id="imagePreviewArea" class="image-preview-area" style="display: none;">
        <div id="imagePreviewList" class="image-preview-list"></div>
      </div>
      <!-- 搜索结果预览 -->
      <div id="searchPreviewArea" class="search-preview-area" style="display: none;">
        <div class="search-preview-header">
          <span>搜索结果</span>
          <button id="clearSearchBtn" class="icon-btn-small"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></button>
        </div>
        <div id="searchPreviewContent" class="search-preview-content"></div>
      </div>
      <!-- Moon Memory 记忆库 -->
      <div id="moonMemoryPreviewArea" class="moon-memory-preview-area" style="display: none;">
        <div class="moon-memory-header">
          <span>记忆</span>
          <button id="clearMoonMemoryBtn" class="icon-btn-small"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></button>
        </div>
        <div class="moon-memory-config">
          <input id="moonMemoryTokenInput" type="password" placeholder="Moon Memory API Token（只保存在本机）">
          <div class="moon-memory-row">
            <input id="moonMemoryQueryInput" type="text" placeholder="手动检索关键词（留空用当前消息）">
            <button id="moonMemorySearchBtn" class="secondary-button" type="button">检索</button>
          </div>
        </div>
        <div id="moonMemoryContent" class="moon-memory-content">填写 Token 后，发消息时会自动检索相关记忆注入上下文。</div>
      </div>
      <div class="input-wrapper">
        <button id="imageUploadBtn" class="input-action-btn" title="上传图片">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="2" width="14" height="12" rx="2"/><path d="M1 10l4-4 3 3 2-2 5 5"/><circle cx="11.5" cy="5.5" r="1.2" fill="currentColor" stroke="none"/></svg>
        </button>
        <button id="locationBtn" class="input-action-btn" title="获取位置">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1a5 5 0 0 1 5 5c0 4-5 9-5 9S3 10 3 6a5 5 0 0 1 5-5z"/><circle cx="8" cy="6" r="2"/></svg>
        </button>
        <button id="searchBtn" class="input-action-btn" title="联网搜索">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14.5" y2="14.5"/></svg>
        </button>
        <button id="moonMemoryBtn" class="input-action-btn" title="月亮记忆库">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 10A7 7 0 0 1 6 2.5a6.5 6.5 0 1 0 7.5 7.5z"/></svg>
        </button>
        <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">
        <textarea id="userInput" placeholder="写下想说的话……" rows="1"></textarea>
        <button id="sendButton" class="send-btn" title="发送">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h10"/><path d="M7 2l5 5-5 5"/></svg>
        </button>
      </div>
      <div id="statusBar" class="status-bar"></div>
    </div>
  </main>

  <!-- 重命名对话弹窗 -->
  <div id="renameChatModal" class="modal-overlay hidden">
    <div class="modal-panel small">
      <div class="modal-header">
        <span>重命名对话</span>
        <button id="closeRenameChatModal" class="icon-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <input id="renameChatInput" type="text" placeholder="对话名称">
      </div>
      <div class="modal-footer">
        <button id="renameChatCancel" class="ghost-button">取消</button>
        <button id="renameChatConfirm" class="primary-button">确定</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="data.js"></script>
  <script src="memory-rag.js"></script>
  <script src="context-cache.js"></script>
  <script src="chat.js"></script>
  <script src="moon-memory-bridge.js"></script>
  <script src="version.js"></script>
  <script src="sw-register.js"></script>
</body>
</html>
