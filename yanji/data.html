<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Hub · 数据</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#f5f0e8">
</head>
<body>
  <header class="top-nav">
    <div class="top-nav-left">
      <span class="app-logo">LLM Hub</span>
      <span class="top-nav-page">数据</span>
    </div>
    <nav class="top-nav-links">
      <a href="index.html">💬 聊天</a>
      <a href="connections.html">连接</a>
      <a href="memory.html">记忆</a>
      <a href="data.html" class="active">数据</a>
    </nav>
  </header>

  <div class="settings-page">
    <header class="settings-header">
      <h1>数据管理 & 云同步</h1>
      <p>登录后数据自动同步到云端，换设备、清缓存都不怕丢。</p>
    </header>

    <section class="settings-body narrow">
      <!-- 云同步状态区 -->
      <div class="field">
        <span>☁️ 云同步</span>
        <div id="syncStatusArea">
          <!-- 未登录状态 -->
          <div id="notLoggedInArea">
            <p class="field-hint">登录后开启云同步，数据自动备份到 Supabase。</p>
            <div class="auth-tabs">
              <button type="button" id="showLoginTab" class="auth-tab active">登录</button>
              <button type="button" id="showRegisterTab" class="auth-tab">注册</button>
            </div>
            
            <div id="loginForm" class="auth-form">
              <input id="loginEmail" type="email" placeholder="邮箱">
              <input id="loginPassword" type="password" placeholder="密码">
              <button id="loginButton" class="primary-button">登录</button>
            </div>
            
            <div id="registerForm" class="auth-form" style="display: none;">
              <input id="registerEmail" type="email" placeholder="邮箱">
              <input id="registerPassword" type="password" placeholder="密码（至少6位）">
              <button id="registerButton" class="primary-button">注册</button>
            </div>
            
            <div id="authMessage" class="auth-message"></div>
          </div>

          <!-- 已登录状态 -->
          <div id="loggedInArea" style="display: none;">
            <div class="sync-status-row">
              <span class="sync-user">📧 <span id="userEmail"></span></span>
              <span id="syncIndicator" class="sync-indicator">●</span>
            </div>
            <p class="field-hint" id="lastSyncTime">上次同步：从未</p>
            <div class="editor-buttons" style="justify-content: flex-start; gap: 8px;">
              <button id="syncNowButton" class="secondary-button">⬆️ 推送到云端</button>
              <button id="pullFromCloudButton" class="secondary-button">⬇️ 从云端拉取</button>
              <button id="logoutButton" class="ghost-button">退出登录</button>
            </div>
            <p class="field-hint" style="margin-top: 8px;">拉取时可选择「合并」或「覆盖」，合并不会丢失本地数据。</p>
          </div>
        </div>
      </div>

      <hr class="settings-separator">

      <div class="field">
        <span>📁 本地导出</span>
        <button id="exportDataButton" class="secondary-button">导出为 JSON 文件</button>
        <p class="field-hint">包含连接配置、会话记录、摘要等内容，方便你自己备份或迁移。</p>
      </div>

      <div class="field">
        <span>📂 本地导入</span>
        <input id="importFileInput" type="file" accept="application/json">
        <p class="field-hint">导入时可选择「合并」或「覆盖」。合并会保留本地数据，只添加新的内容。</p>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="data.js"></script>
  <script src="version.js"></script>
  <script src="sw-register.js"></script>

</body>
</html>
