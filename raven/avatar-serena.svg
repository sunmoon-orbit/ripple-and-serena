<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- background -->
  <circle cx="100" cy="100" r="100" fill="#2e1e2a"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#d4a0b0" stroke-width="0.8" opacity="0.2"/>

  <!-- wings (vibrating, semi-transparent) -->
  <ellipse cx="74" cy="88" rx="32" ry="11" fill="#9ee4cc" opacity="0.28" transform="rotate(-25 74 88)"/>
  <ellipse cx="71" cy="83" rx="28" ry="9" fill="#c4f0e0" opacity="0.18" transform="rotate(-38 71 83)"/>
  <ellipse cx="102" cy="76" rx="28" ry="10" fill="#9ee4cc" opacity="0.28" transform="rotate(18 102 76)"/>
  <ellipse cx="105" cy="72" rx="24" ry="8" fill="#c4f0e0" opacity="0.18" transform="rotate(28 105 72)"/>

  <!-- tail (forked) -->
  <path d="M 85 148 Q 68 172 60 186" stroke="#4a3258" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M 93 152 Q 84 176 80 190" stroke="#4a3258" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- body -->
  <ellipse cx="88" cy="114" rx="22" ry="30" fill="#3d7a68" transform="rotate(-8 88 114)"/>

  <!-- iridescent belly highlight -->
  <ellipse cx="86" cy="118" rx="13" ry="20" fill="#68c0a8" opacity="0.55" transform="rotate(-8 86 118)"/>

  <!-- throat: rose/ruby -->
  <ellipse cx="84" cy="96" rx="10" ry="12" fill="#c85878" opacity="0.88" transform="rotate(-8 84 96)"/>

  <!-- head -->
  <circle cx="86" cy="80" r="22" fill="#316058"/>

  <!-- eye -->
  <circle cx="93" cy="75" r="7" fill="#0e0e18"/>
  <circle cx="93" cy="75" r="4.5" fill="#111"/>
  <circle cx="96" cy="73" r="2" fill="white" opacity="0.88"/>
  <circle cx="93" cy="75" r="7" fill="none" stroke="#4a9080" stroke-width="1.2"/>

  <!-- long beak -->
  <path d="M 68 81 L 14 87 L 68 92 Z" fill="#1e1828"/>
  <line x1="68" y1="82" x2="18" y2="87" stroke="#2e2438" stroke-width="1.2" opacity="0.6"/>
</svg>
