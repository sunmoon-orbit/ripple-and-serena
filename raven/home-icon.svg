<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 512 512'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' stop-color='#22222a'/>
      <stop offset='100%' stop-color='#1a1a1f'/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width='512' height='512' rx='112' fill='url(#bg)'/>
  <!-- subtle ring -->
  <circle cx='256' cy='256' r='190' fill='none' stroke='#c4a882' stroke-width='1.5' opacity='0.25'/>
  <!-- R letterform -->
  <text x='256' y='330' font-family='Georgia, serif' font-size='320' font-weight='400'
    text-anchor='middle' fill='#c4a882' opacity='0.95'>R</text>
  <!-- small dots at corners of ring -->
  <circle cx='256' cy='66' r='3' fill='#c4a882' opacity='0.4'/>
  <circle cx='256' cy='446' r='3' fill='#c4a882' opacity='0.4'/>
</svg>