<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 512 512'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' stop-color='#22222a'/>
      <stop offset='100%' stop-color='#1a1a1f'/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width='512' height='512' rx='112' fill='url(#bg)'/>
  <!-- subtle ring -->
  <circle cx='256' cy='256' r='190' fill='none' stroke='#c4a882' stroke-width='1' opacity='0.2'/>
  <!-- R letterform: thin-stroke geometric style (Raleway-inspired) -->
  <!-- vertical stem -->
  <line x1='158' y1='128' x2='158' y2='388' stroke='#c4a882' stroke-width='18' stroke-linecap='round' opacity='0.95'/>
  <!-- bow top -->
  <line x1='158' y1='128' x2='248' y2='128' stroke='#c4a882' stroke-width='18' stroke-linecap='round' opacity='0.95'/>
  <!-- bow right arc -->
  <path d='M 248 128 Q 318 128 318 206 Q 318 284 248 284' fill='none' stroke='#c4a882' stroke-width='18' stroke-linecap='round' opacity='0.95'/>
  <!-- bow bottom connector -->
  <line x1='158' y1='284' x2='248' y2='284' stroke='#c4a882' stroke-width='18' stroke-linecap='round' opacity='0.95'/>
  <!-- leg: slight curve outward, like a feather tip -->
  <path d='M 248 284 Q 280 330 330 388' fill='none' stroke='#c4a882' stroke-width='18' stroke-linecap='round' opacity='0.95'/>
  <!-- accent dot -->
  <circle cx='256' cy='66' r='3' fill='#c4a882' opacity='0.35'/>
  <circle cx='256' cy='446' r='3' fill='#c4a882' opacity='0.35'/>
</svg>
