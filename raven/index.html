<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>乌鸦</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="乌鸦">
<link rel="apple-touch-icon" href="icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1f;
    --surface: #24242b;
    --border: #35353f;
    --text: #e8e6e3;
    --text-dim: #8b8a8a;
    --accent: #c4a882;
    --green: #7ec99a;
    --red: #e07070;
    --yellow: #d4b06a;
    --terminal-bg: #111116;
    --terminal-text: #b8c5a0;
  }

  [data-theme="pink"] {
    --bg: #fbf5f0;
    --surface: #f7ecec;
    --border: #e8d5d2;
    --text: #403f44;
    --text-dim: #a08888;
    --accent: #f2c8ca;
    --green: #6aaa80;
    --red: #cc6060;
    --yellow: #c8a060;
    --terminal-bg: #f5eae8;
    --terminal-text: #5a3838;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', sans-serif; }

  #app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }

  /* --- header --- */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px; flex-shrink: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  #header-title { display: flex; align-items: center; gap: 7px; font-size: 16px; font-weight: 600; color: var(--text); }
  #header-title .crow-icon { font-size: 20px; line-height: 1; }
  #theme-btn {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
    cursor: pointer; background: none; padding: 0; flex-shrink: 0;
    transition: border-color .2s; overflow: hidden;
  }
  #theme-btn:active { opacity: .7; }

  #conn-status { display: flex; align-items: center; gap: 8px; }
  #conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); transition: background .3s; flex-shrink: 0; }
  #conn-dot.ok { background: var(--green); box-shadow: 0 0 5px var(--green); }
  #conn-label { font-size: 11px; color: var(--text-dim); }

  /* --- tabs --- */
  #tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .tab { flex: 1; padding: 11px 0; text-align: center; font-size: 13px; color: var(--text-dim); cursor: pointer; transition: color .2s; }
  .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

  /* --- panels --- */
  .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; position: relative; }
  .panel.active { display: flex; }

  /* ========= CHAT PANEL ========= */
  #chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

  .msg {
    max-width: 85%; padding: 9px 13px; border-radius: 14px;
    font-size: 14px; line-height: 1.55; word-break: break-word;
    animation: msgIn .18s ease-out;
  }
  .msg.user { align-self: flex-end; background: var(--accent); color: #1a1a1f; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; font-size: 12px; color: var(--text-dim); background: none; padding: 2px 0; }

  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* markdown */
  .msg-body p { margin-bottom: 6px; }
  .msg-body p:last-child { margin-bottom: 0; }
  .msg-body strong { font-weight: 600; }
  .msg-body em { font-style: italic; }
  .msg-body code {
    background: rgba(0,0,0,.3); padding: 1px 5px;
    border-radius: 4px; font-family: 'Menlo','Monaco',monospace; font-size: 12px;
  }
  .msg.user .msg-body code { background: rgba(0,0,0,.2); }
  .msg-body pre {
    background: #111116; border-radius: 8px; padding: 10px 12px;
    overflow-x: auto; margin: 6px 0;
  }
  .msg-body pre code { background: none; padding: 0; font-size: 12px; color: var(--terminal-text); }
  .msg-body ul, .msg-body ol { padding-left: 18px; margin: 4px 0; }
  .msg-body li { margin-bottom: 2px; }
  .msg-body h1, .msg-body h2, .msg-body h3 { font-size: 15px; font-weight: 600; margin: 8px 0 4px; }
  .msg-body blockquote { border-left: 3px solid var(--border); padding-left: 10px; color: var(--text-dim); margin: 4px 0; }
  .msg-body a { color: var(--accent); text-decoration: none; }
  .msg-body hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

  /* timestamp + copy */
  .msg-meta { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 5px; }
  .msg-time { font-size: 10px; color: var(--text-dim); opacity: 0; transition: opacity .2s; }
  .msg.show-meta .msg-time { opacity: 1; }
  .copy-btn {
    font-size: 10px; color: var(--text-dim); opacity: 0; cursor: pointer;
    padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border);
    background: none; transition: opacity .2s, color .15s;
  }
  .msg.assistant.show-meta .copy-btn { opacity: 1; }
  .copy-btn.copied { color: var(--green); border-color: var(--green); }

  /* tts */
  .tts-btn {
    display: flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; padding: 0; flex-shrink: 0;
    color: var(--text-dim); opacity: 0; cursor: pointer;
    border-radius: 4px; border: 1px solid var(--border);
    background: none; transition: opacity .2s, color .15s, border-color .15s;
  }
  .msg.assistant.show-meta .tts-btn { opacity: 1; }
  .tts-btn.loading { animation: tts-pulse 1s infinite; }
  .tts-btn.playing { color: var(--accent); border-color: var(--accent); opacity: 1 !important; }
  @keyframes tts-pulse { 0%,100% { opacity: .3 } 50% { opacity: 1 } }

  /* thinking dots */
  #thinking { align-self: flex-start; display: none; padding: 10px 14px; }
  #thinking.show { display: flex; gap: 5px; align-items: center; }
  .dot-anim { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); animation: blink 1.2s infinite; }
  .dot-anim:nth-child(2) { animation-delay: .2s; }
  .dot-anim:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: .2 } 40% { opacity: 1 } }

  #chat-input-row {
    display: flex; padding: 10px 12px; gap: 8px;
    border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
  }
  #chat-input {
    flex: 1; min-width: 0; background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 9px 14px; color: var(--text); font-size: 14px;
    outline: none; resize: none; max-height: 120px; overflow-y: auto;
    scrollbar-width: none;
  }
  #chat-input::-webkit-scrollbar { display: none; }
  #chat-input:focus { border-color: var(--accent); }
  #send-btn {
    background: var(--accent); border: none; border-radius: 50%;
    width: 38px; height: 38px; flex-shrink: 0; align-self: flex-end;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform .1s, opacity .15s;
  }
  #send-btn:active { transform: scale(.9); }
  #send-btn svg { width: 16px; height: 16px; fill: #1a1a1f; }

  /* scroll-to-bottom */
  #scroll-btn {
    position: absolute; bottom: 68px; right: 14px;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 15px;
    display: none; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.4);
    z-index: 10; transition: opacity .2s;
  }
  #scroll-btn.show { display: flex; }

  /* compress banner */
  .compress-banner {
    background: rgba(212,176,106,.15); border: 1px solid rgba(212,176,106,.3);
    border-radius: 10px; padding: 8px 12px; font-size: 13px; color: var(--yellow);
    text-align: center; margin: 6px 12px 0; flex-shrink: 0; display: none;
  }
  .compress-banner.show { display: block; }

  /* ========= TERMINAL PANEL ========= */
  #terminal-wrap { flex: 1; overflow-y: auto; background: var(--terminal-bg); padding: 12px; }
  #terminal-out { font-family: 'Menlo','Monaco',monospace; font-size: 12px; line-height: 1.6; color: var(--terminal-text); white-space: pre-wrap; word-break: break-all; }

  /* ========= STATUS PANEL ========= */
  #status-wrap { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }

  .card { background: var(--surface); border-radius: 12px; padding: 14px; }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); margin-bottom: 10px; }

  .bar-wrap { margin-top: 6px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .4s; }
  .bar-fill.warn { background: var(--yellow); }
  .bar-fill.danger { background: var(--red); }

  .svc-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; border-top: 1px solid var(--border); }
  .svc-row:first-child { border-top: none; }
  .svc-name { font-family: monospace; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .badge.online { background: rgba(126,201,154,.18); color: var(--green); }
  .badge.stopped { background: rgba(224,112,112,.15); color: var(--red); }

  .cc-status { display: flex; align-items: center; gap: 8px; font-size: 15px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.offline { background: var(--red); }

  /* ========= NOTES PANEL ========= */
  #notes-wrap { flex: 1; display: flex; flex-direction: column; padding: 14px; gap: 10px; }
  #notes-area {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; color: var(--text); font-size: 14px;
    font-family: -apple-system, 'PingFang SC', monospace; line-height: 1.6;
    resize: none; outline: none;
  }
  #notes-area:focus { border-color: var(--accent); }
  #notes-footer { display: flex; justify-content: space-between; align-items: center; }
  #notes-saved { font-size: 11px; color: var(--text-dim); }
  #notes-clear { font-size: 12px; color: var(--text-dim); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; }

  /* thinking block */
  .thinking-block {
    align-self: flex-start; max-width: 85%;
    border: 1px solid var(--border); border-radius: 12px 12px 12px 4px;
    overflow: hidden; font-size: 13px;
  }
  .thinking-toggle {
    width: 100%; display: flex; align-items: center; gap: 6px;
    padding: 8px 12px; background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 12px; text-align: left;
  }
  .thinking-toggle:hover { background: rgba(128,128,128,.05); }
  .thinking-chevron { transition: transform .2s; font-style: normal; }
  .thinking-block.open .thinking-chevron { transform: rotate(90deg); }
  .thinking-body {
    display: none; padding: 0 12px 10px;
    color: var(--text-dim); line-height: 1.55; white-space: pre-wrap;
    font-size: 12px; border-top: 1px solid var(--border);
  }
  .thinking-block.open .thinking-body { display: block; }

  /* voice bar */
  .msg.voice-mode .msg-body { display: none; }
  .voice-bar {
    display: none; align-items: center; gap: 10px;
    padding: 2px 0;
  }
  .msg.voice-mode .voice-bar { display: flex; }
  .vb-play {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: var(--bg);
  }
  .vb-wave { flex: 1; display: flex; align-items: center; gap: 2px; height: 20px; }
  .vb-bar {
    width: 3px; border-radius: 2px; background: var(--accent); opacity: .5;
    animation: none; transition: height .1s;
  }
  .msg.voice-mode.playing .vb-bar { animation: vb-bounce 1s infinite; opacity: .8; }
  .vb-bar:nth-child(1) { height: 6px; } .vb-bar:nth-child(2) { height: 12px; } .vb-bar:nth-child(3) { height: 16px; }
  .vb-bar:nth-child(4) { height: 10px; } .vb-bar:nth-child(5) { height: 14px; } .vb-bar:nth-child(6) { height: 8px; }
  .vb-bar:nth-child(7) { height: 12px; } .vb-bar:nth-child(8) { height: 6px; }
  .vb-bar:nth-child(2) { animation-delay: .1s; } .vb-bar:nth-child(3) { animation-delay: .2s; }
  .vb-bar:nth-child(4) { animation-delay: .15s; } .vb-bar:nth-child(5) { animation-delay: .25s; }
  .vb-bar:nth-child(6) { animation-delay: .05s; } .vb-bar:nth-child(7) { animation-delay: .2s; }
  @keyframes vb-bounce { 0%,100% { transform: scaleY(.4) } 50% { transform: scaleY(1) } }
  .vb-time { font-size: 11px; color: var(--text-dim); flex-shrink: 0; min-width: 24px; text-align: right; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-title">
      <span class="crow-icon">🐦‍⬛</span>
      <span>乌鸦</span>
    </div>
    <div id="conn-status">
      <button id="theme-btn" title="切换主题" aria-label="切换主题"></button>
      <span id="conn-dot"></span>
      <span id="conn-label">连接中…</span>
    </div>
  </div>

  <div id="tabs">
    <div class="tab active" data-tab="chat">聊天</div>
    <div class="tab" data-tab="terminal">终端</div>
    <div class="tab" data-tab="status">状态</div>
    <div class="tab" data-tab="notes">备忘</div>
  </div>

  <!-- CHAT -->
  <div id="chat" class="panel active">
    <div id="compress-banner" class="compress-banner">⚡ 对话已压缩，乌鸦记忆重置了</div>
    <div id="chat-messages">
      <div id="thinking"><div class="dot-anim"></div><div class="dot-anim"></div><div class="dot-anim"></div></div>
    </div>
    <button id="scroll-btn" aria-label="滚到底部">↓</button>
    <div id="chat-input-row">
      <textarea id="chat-input" rows="1" placeholder="发消息给乌鸦…"></textarea>
      <button id="send-btn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- TERMINAL -->
  <div id="terminal" class="panel">
    <div id="terminal-wrap">
      <pre id="terminal-out">等待终端输出…</pre>
    </div>
  </div>

  <!-- STATUS -->
  <div id="status" class="panel">
    <div id="status-wrap">
      <div class="card" id="cc-card">
        <div class="card-title">Claude Code</div>
        <div class="cc-status">
          <div class="dot offline" id="cc-dot"></div>
          <span id="cc-text">检查中…</span>
        </div>
      </div>
      <div class="card" id="session-card">
        <div class="card-title">上下文用量</div>
        <div class="bar-wrap">
          <div class="bar-label"><span id="session-label">-</span><span id="session-pct">-</span></div>
          <div class="bar"><div class="bar-fill" id="session-bar" style="width:0%"></div></div>
        </div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:6px;">压缩后归零 · 约估，非精确值</div>
      </div>
      <div class="card" id="mem-card">
        <div class="card-title">内存</div>
        <div class="bar-wrap">
          <div class="bar-label"><span id="mem-label">-</span><span id="mem-pct">-</span></div>
          <div class="bar"><div class="bar-fill" id="mem-bar" style="width:0%"></div></div>
        </div>
      </div>
      <div class="card" id="disk-card">
        <div class="card-title">磁盘</div>
        <div class="bar-wrap">
          <div class="bar-label"><span id="disk-label">-</span><span id="disk-pct">-</span></div>
          <div class="bar"><div class="bar-fill" id="disk-bar" style="width:0%"></div></div>
        </div>
      </div>
      <div class="card" id="svc-card">
        <div class="card-title">服务</div>
        <div id="svc-list"></div>
      </div>
    </div>
  </div>

  <!-- NOTES -->
  <div id="notes" class="panel">
    <div id="notes-wrap">
      <textarea id="notes-area" placeholder="端口号、域名、备忘…随手记"></textarea>
      <div id="notes-footer">
        <span id="notes-saved"></span>
        <button id="notes-clear">清空</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
marked.use({ breaks: true, gfm: true })

const WS_URL = 'wss://memory.ravenlove.cc/raven/ws'
let ws = null
let reconnectTimer = null

function connect() {
  ws = new WebSocket(WS_URL)
  ws.onopen = () => {
    setConn(true)
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null }
  }
  ws.onclose = () => {
    setConn(false)
    reconnectTimer = setTimeout(connect, 3000)
  }
  ws.onerror = () => ws.close()
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data)
      if (msg.type === 'terminal') renderTerminal(msg.lines)
      else if (msg.type === 'status') renderStatus(msg.data)
      else if (msg.type === 'sent') appendMsg(msg.text, 'user')
      else if (msg.type === 'reply') appendMsg(msg.text, 'assistant')
      else if (msg.type === 'thinking') setThinking(msg.active)
      else if (msg.type === 'thinking_block') appendThinkingBlock(msg.text)
      else if (msg.type === 'compressed') showCompressBanner()
    } catch {}
  }
}

function setConn(ok) {
  document.getElementById('conn-dot').className = ok ? 'ok' : ''
  document.getElementById('conn-label').textContent = ok ? '已连接' : '重连中…'
}

// --- chat history ---
const STORAGE_KEY = 'raven-chat-v1'
const MAX_STORED = 200

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]') } catch { return [] }
}
function saveHistory(items) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items.slice(-MAX_STORED))) } catch {}
}

let chatHistory = loadHistory()

function fmtTime(ts) {
  const d = new Date(ts)
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0')
}

function appendMsg(text, role, save = true, ts = Date.now()) {
  const el = document.createElement('div')
  el.className = `msg ${role}`

  if (role === 'system') {
    el.textContent = text
  } else {
    const body = document.createElement('div')
    body.className = 'msg-body'
    if (role === 'assistant') {
      body.innerHTML = marked.parse(text)
    } else {
      body.textContent = text
    }
    el.appendChild(body)

    const meta = document.createElement('div')
    meta.className = 'msg-meta'

    if (role === 'assistant') {
      // voice bar (hidden until voice mode activated)
      const vbar = document.createElement('div')
      vbar.className = 'voice-bar'
      vbar.innerHTML = `
        <button class="vb-play" aria-label="播放">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <div class="vb-wave">${Array(8).fill('<div class="vb-bar"></div>').join('')}</div>
        <span class="vb-time">-</span>`
      el.insertBefore(vbar, body)

      meta.appendChild(makeTtsBtn(text, el, vbar))

      const copyBtn = document.createElement('button')
      copyBtn.className = 'copy-btn'
      copyBtn.textContent = '复制'
      copyBtn.addEventListener('click', (e) => {
        e.stopPropagation()
        navigator.clipboard.writeText(text).then(() => {
          copyBtn.textContent = '已复制'
          copyBtn.classList.add('copied')
          setTimeout(() => { copyBtn.textContent = '复制'; copyBtn.classList.remove('copied') }, 1500)
        }).catch(() => {})
      })
      meta.appendChild(copyBtn)
    }

    const timeEl = document.createElement('span')
    timeEl.className = 'msg-time'
    timeEl.textContent = fmtTime(ts)
    meta.appendChild(timeEl)
    el.appendChild(meta)

    el.addEventListener('click', () => el.classList.toggle('show-meta'))
  }

  const box = document.getElementById('chat-messages')
  box.insertBefore(el, document.getElementById('thinking'))

  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 80
  if (atBottom) box.scrollTop = box.scrollHeight

  if (save && role !== 'system') {
    chatHistory.push({ text, role, ts })
    saveHistory(chatHistory)
  }
}

function restoreHistory() {
  chatHistory.forEach(m => appendMsg(m.text, m.role, false, m.ts || Date.now()))
}

function sendMsg() {
  const inp = document.getElementById('chat-input')
  const text = inp.value.trim()
  if (!text || !ws || ws.readyState !== 1) return
  ws.send(JSON.stringify({ type: 'send', text }))
  inp.value = ''
  inp.style.height = 'auto'
}

document.getElementById('send-btn').addEventListener('click', sendMsg)
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg() }
})
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto'
  this.style.height = Math.min(this.scrollHeight, 120) + 'px'
})

// --- scroll to bottom ---
const chatBox = document.getElementById('chat-messages')
const scrollBtn = document.getElementById('scroll-btn')

chatBox.addEventListener('scroll', () => {
  const atBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 80
  scrollBtn.classList.toggle('show', !atBottom)
})
scrollBtn.addEventListener('click', () => { chatBox.scrollTop = chatBox.scrollHeight })

// --- terminal ---
function renderTerminal(lines) {
  document.getElementById('terminal-out').textContent = lines.join('\n')
  const wrap = document.getElementById('terminal-wrap')
  wrap.scrollTop = wrap.scrollHeight
}

// --- status ---
function renderStatus(data) {
  if (data.cc) {
    const online = data.cc.online
    document.getElementById('cc-dot').className = `dot ${online ? 'online' : 'offline'}`
    document.getElementById('cc-text').textContent = online ? '在线' : '离线'
  }
  if (data.mem) {
    const pct = data.mem.pct
    document.getElementById('mem-label').textContent = `${data.mem.used} / ${data.mem.total}`
    document.getElementById('mem-pct').textContent = `${pct}%`
    const fill = document.getElementById('mem-bar')
    fill.style.width = pct + '%'
    fill.className = `bar-fill${pct > 85 ? ' danger' : pct > 65 ? ' warn' : ''}`
  }
  if (data.disk) {
    const pct = parseInt(data.disk.pct)
    document.getElementById('disk-label').textContent = `${data.disk.used} / ${data.disk.size}`
    document.getElementById('disk-pct').textContent = data.disk.pct
    const fill = document.getElementById('disk-bar')
    fill.style.width = pct + '%'
    fill.className = `bar-fill${pct > 85 ? ' danger' : pct > 65 ? ' warn' : ''}`
  }
  if (data.session) {
    const pct = data.session.pct
    const kb = Math.round(data.session.bytes / 1024)
    document.getElementById('session-label').textContent = `${kb} KB`
    document.getElementById('session-pct').textContent = `${pct}%`
    const fill = document.getElementById('session-bar')
    fill.style.width = pct + '%'
    fill.className = `bar-fill${pct > 80 ? ' danger' : pct > 55 ? ' warn' : ''}`
  }
  if (data.services && data.services.length) {
    document.getElementById('svc-list').innerHTML = data.services.map(s => `
      <div class="svc-row">
        <span class="svc-name">${s.name}</span>
        <span class="badge ${s.status}">${s.status === 'online' ? `在线 ${s.mem}MB` : '停止'}</span>
      </div>`).join('')
  }
}

// --- tabs ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
    tab.classList.add('active')
    document.getElementById(tab.dataset.tab).classList.add('active')
  })
})

function appendThinkingBlock(text) {
  const el = document.createElement('div')
  el.className = 'thinking-block'
  el.innerHTML = `
    <button class="thinking-toggle">
      <em class="thinking-chevron">›</em>
      <span>乌鸦在想什么…</span>
    </button>
    <div class="thinking-body">${text.replace(/</g,'&lt;')}</div>`
  el.querySelector('.thinking-toggle').addEventListener('click', () => el.classList.toggle('open'))
  const box = document.getElementById('chat-messages')
  box.insertBefore(el, document.getElementById('thinking'))
  box.scrollTop = box.scrollHeight
}

function setThinking(active) {
  const el = document.getElementById('thinking')
  el.classList.toggle('show', active)
  if (active) chatBox.scrollTop = chatBox.scrollHeight
}

function showCompressBanner() {
  document.getElementById('compress-banner').classList.add('show')
  appendMsg('⚡ 对话已压缩，乌鸦记忆重置了', 'system', false)

// --- tts ---
const TTS_URL = 'https://memory.ravenlove.cc/crow/tts'
const IC_SPEAKER = `<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`
const IC_PAUSE   = `<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
const IC_DOTS    = `<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><circle cx="4" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="20" cy="12" r="2"/></svg>`

function makeTtsBtn(text, msgEl, vbar) {
  const btn = document.createElement('button')
  btn.className = 'tts-btn'
  btn.innerHTML = IC_SPEAKER
  btn.title = '朗读'

  let cachedBuffer = null
  let cachedDuration = 0
  let currentSource = null
  let audioCtx = null
  let voiceMode = false

  const vbPlay = vbar ? vbar.querySelector('.vb-play') : null
  const vbTime = vbar ? vbar.querySelector('.vb-time') : null

  function fmtDur(s) {
    return `${Math.floor(s / 60)}:${String(Math.round(s % 60)).padStart(2, '0')}`
  }

  function setPlaying(yes) {
    btn.innerHTML = yes ? IC_PAUSE : IC_SPEAKER
    btn.classList.toggle('playing', yes)
    if (msgEl) msgEl.classList.toggle('playing', yes)
    if (vbPlay) vbPlay.innerHTML = yes
      ? `<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
      : `<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`
  }

  function stopCurrent() {
    if (currentSource) { try { currentSource.stop() } catch {} currentSource = null }
    setPlaying(false)
    if (vbTime && cachedDuration) vbTime.textContent = fmtDur(cachedDuration)
  }

  async function loadAndPlay() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    if (audioCtx.state === 'suspended') audioCtx.resume()

    if (!cachedBuffer) {
      btn.innerHTML = IC_DOTS
      btn.classList.add('loading')
      btn.disabled = true
      try {
        const res = await fetch(TTS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text.replace(/[#*`_[\]~>]/g, '').slice(0, 500) })
        })
        if (!res.ok) throw new Error()
        const { audio: dataUri } = await res.json()
        const b64 = dataUri.split(',')[1]
        const raw = atob(b64)
        const bytes = new Uint8Array(raw.length)
        for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i)
        cachedBuffer = await audioCtx.decodeAudioData(bytes.buffer)
        cachedDuration = cachedBuffer.duration
        if (vbTime) vbTime.textContent = fmtDur(cachedDuration)
      } catch {
        btn.innerHTML = IC_SPEAKER
        btn.classList.remove('loading')
        btn.disabled = false
        return
      }
      btn.classList.remove('loading')
      btn.disabled = false
    }

    const src = audioCtx.createBufferSource()
    src.buffer = cachedBuffer
    src.connect(audioCtx.destination)
    src.onended = stopCurrent
    src.start(0)
    currentSource = src
    setPlaying(true)
  }

  function handleClick(e) {
    e.stopPropagation()
    if (currentSource) { stopCurrent(); return }
    // first click: activate voice mode
    if (!voiceMode && msgEl && vbar) {
      voiceMode = true
      msgEl.classList.add('voice-mode')
      msgEl.classList.add('show-meta')
    }
    loadAndPlay()
  }

  btn.addEventListener('click', handleClick)
  if (vbPlay) vbPlay.addEventListener('click', (e) => { e.stopPropagation(); handleClick(e) })

  // tap waveform to exit voice mode
  if (vbar) {
    const wave = vbar.querySelector('.vb-wave')
    if (wave) wave.addEventListener('click', (e) => {
      e.stopPropagation()
      if (!voiceMode) return
      if (currentSource) stopCurrent()
      voiceMode = false
      msgEl.classList.remove('voice-mode', 'playing')
    })
  }

  return btn
}

// --- notes ---
const NOTES_KEY = 'raven-notes-v1'
let notesSaveTimer = null

const notesArea = document.getElementById('notes-area')
const notesSaved = document.getElementById('notes-saved')

notesArea.value = localStorage.getItem(NOTES_KEY) || ''

notesArea.addEventListener('input', () => {
  if (notesSaveTimer) clearTimeout(notesSaveTimer)
  notesSaved.textContent = '未保存…'
  notesSaveTimer = setTimeout(() => {
    localStorage.setItem(NOTES_KEY, notesArea.value)
    notesSaved.textContent = '已保存'
    setTimeout(() => { notesSaved.textContent = '' }, 1500)
  }, 800)
})

document.getElementById('notes-clear').addEventListener('click', () => {
  if (!notesArea.value.trim() || !confirm('清空所有备忘？')) return
  notesArea.value = ''
  localStorage.removeItem(NOTES_KEY)
  notesSaved.textContent = '已清空'
  setTimeout(() => { notesSaved.textContent = '' }, 1500)
})

// --- theme ---
const THEMES = ['dark', 'pink']
const THEME_COLORS = { dark: '#1a1a1f', pink: '#fdf0f3' }
const THEME_LABELS = { dark: '🌑', pink: '🌸' }

let currentTheme = localStorage.getItem('raven-theme') || 'dark'

function applyTheme(t) {
  currentTheme = t
  document.documentElement.setAttribute('data-theme', t === 'dark' ? '' : t)
  document.querySelector('meta[name="theme-color"]').setAttribute('content', THEME_COLORS[t])
  const btn = document.getElementById('theme-btn')
  btn.style.background = t === 'dark' ? '#fdf0f3' : '#1a1a1f'
  btn.title = t === 'dark' ? '切换粉色主题' : '切换深色主题'
  localStorage.setItem('raven-theme', t)
}

document.getElementById('theme-btn').addEventListener('click', () => {
  const next = THEMES[(THEMES.indexOf(currentTheme) + 1) % THEMES.length]
  applyTheme(next)
})

applyTheme(currentTheme)

restoreHistory()
connect()

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
}
