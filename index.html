<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苏堤柳塔罗 · Willow Tarot</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#5B7B5D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="苏堤柳塔罗">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --cream-light: #FAF8F3;
  --sage: #5B7B5D;
  --sage-light: #8FA88F;
  --sage-pale: #D4E2D4;
  --gold: #C5A55A;
  --gold-light: #E8D9A0;
  --gold-glow: rgba(197, 165, 90, 0.4);
  --silver: #A8A9AD;
  --silver-light: #D0D1D4;
  --silver-glow: rgba(168, 169, 173, 0.4);
  --text: #3A3A3A;
  --text-light: #6B6B6B;
  --card-back: #5B7B5D;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Noto Serif SC', 'Songti SC', serif;
  --card-width: 140px;
  --card-height: 240px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== Watercolor Background Texture ===== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(91,123,93,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(197,165,90,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(143,168,143,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ===== Navigation ===== */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  background: linear-gradient(to bottom, var(--cream) 60%, transparent);
}

nav .logo {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 300;
  color: var(--sage);
  letter-spacing: 2px;
  cursor: pointer;
}

nav .logo span {
  font-size: 0.75rem;
  color: var(--sage-light);
  display: block;
  letter-spacing: 4px;
  font-weight: 400;
}

nav .nav-links {
  display: flex;
  gap: 28px;
}

nav .nav-links a {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: var(--text-light);
  text-decoration: none;
  letter-spacing: 1px;
  transition: color 0.3s;
  cursor: pointer;
}

nav .nav-links a:hover { color: var(--sage); }

/* ===== Pages ===== */
.page {
  display: none;
  min-height: 100vh;
  padding: 80px 32px 40px;
  position: relative;
  z-index: 1;
}

.page.active { display: block; }

/* ===== Home / Landing ===== */
#home {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

#home.active { display: flex; }

.home-title {
  font-family: var(--font-display);
  font-size: 3.5rem;
  font-weight: 300;
  color: var(--sage);
  margin-bottom: 8px;
  opacity: 0;
  animation: fadeUp 1s ease 0.2s forwards;
}

.home-subtitle {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 300;
  color: var(--sage-light);
  letter-spacing: 6px;
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 1s ease 0.5s forwards;
}

.home-desc {
  font-size: 0.9rem;
  color: var(--text-light);
  line-height: 2;
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 1s ease 0.8s forwards;
}

.spread-choices {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
  opacity: 0;
  animation: fadeUp 1s ease 1.1s forwards;
}

.spread-btn {
  background: var(--cream-light);
  border: 1px solid var(--sage-pale);
  border-radius: 16px;
  padding: 28px 36px;
  cursor: pointer;
  transition: all 0.4s ease;
  text-align: center;
  min-width: 180px;
}

.spread-btn:hover {
  border-color: var(--sage-light);
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(91,123,93,0.1);
}

.spread-btn .spread-icon {
  font-size: 1.8rem;
  margin-bottom: 12px;
  display: block;
}

.spread-btn .spread-name {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--sage);
  margin-bottom: 4px;
}

.spread-btn .spread-desc {
  font-size: 0.75rem;
  color: var(--text-light);
}

/* ===== Reading Page ===== */
#reading {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 100px;
}

#reading.active { display: flex; }

.reading-title {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 300;
  color: var(--sage);
  margin-bottom: 8px;
  letter-spacing: 2px;
}

.reading-hint {
  font-size: 0.8rem;
  color: var(--text-light);
  margin-bottom: 40px;
}

/* Card Table */
.card-table {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 32px;
  perspective: 1200px;
}

.card-slot {
  width: var(--card-width);
  text-align: center;
}

.card-slot .slot-label {
  font-family: var(--font-display);
  font-size: 0.8rem;
  color: var(--sage-light);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

/* Card */
.card-container {
  width: var(--card-width);
  height: var(--card-height);
  perspective: 800px;
  cursor: pointer;
}

.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}

.card-inner.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 12px;
  overflow: hidden;
}

/* Card Back */
.card-back {
  background: var(--card-back);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--sage-light);
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}

.card-back-pattern {
  width: 85%;
  height: 90%;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.card-back-pattern::before {
  content: '🌿';
  font-size: 2.5rem;
  opacity: 0.6;
}

.card-back-pattern::after {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
}

/* Card Front */
.card-front {
  background: var(--cream-light);
  transform: rotateY(180deg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 12px;
  border: 3px solid var(--gold);
  box-shadow: 0 4px 16px rgba(0,0,0,0.1), 0 0 20px var(--gold-glow);
}

.card-front.reversed {
  border-color: var(--silver);
  box-shadow: 0 4px 16px rgba(0,0,0,0.1), 0 0 20px var(--silver-glow);
}

.card-front .card-numeral {
  font-family: var(--font-display);
  font-size: 0.7rem;
  color: var(--gold);
  letter-spacing: 3px;
  margin-bottom: 4px;
}

.card-front.reversed .card-numeral {
  color: var(--silver);
}

.card-front .card-symbol {
  font-size: 2.8rem;
  margin-bottom: 8px;
  line-height: 1;
}

.card-front .card-name-en {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text);
  text-align: center;
  line-height: 1.3;
  margin-bottom: 4px;
}

.card-front .card-name-cn {
  font-size: 0.75rem;
  color: var(--text-light);
}

.card-front .card-orientation {
  font-family: var(--font-display);
  font-size: 0.65rem;
  letter-spacing: 2px;
  margin-top: 8px;
  padding: 2px 10px;
  border-radius: 10px;
}

.card-front .card-orientation.upright {
  color: var(--gold);
  border: 1px solid var(--gold-light);
}

.card-front .card-orientation.reversed-tag {
  color: var(--silver);
  border: 1px solid var(--silver-light);
}

/* Card draw animation */
.card-container.drawing {
  animation: cardDraw 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes cardDraw {
  0% { transform: translateY(60px) scale(0.8); opacity: 0; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

.card-container.waiting {
  opacity: 0.3;
}

/* Shuffle animation */
.card-container.shuffling {
  animation: shuffle 0.5s ease infinite alternate;
}

@keyframes shuffle {
  0% { transform: translateX(-5px) rotate(-2deg); }
  100% { transform: translateX(5px) rotate(2deg); }
}

/* ===== Interpretation Panel ===== */
.interpretation-panel {
  width: 100%;
  max-width: 720px;
  margin-top: 24px;
  padding: 32px;
  background: var(--cream-light);
  border: 1px solid var(--sage-pale);
  border-radius: 16px;
  display: none;
  animation: fadeUp 0.6s ease forwards;
}

.interpretation-panel.visible { display: block; }

.interpretation-panel h3 {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 400;
  color: var(--sage);
  margin-bottom: 20px;
  text-align: center;
  letter-spacing: 2px;
}

.interp-card {
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--sage-pale);
}

.interp-card:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}

.interp-card .interp-position {
  font-family: var(--font-display);
  font-size: 0.8rem;
  color: var(--sage-light);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.interp-card .interp-name {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
}

.interp-card .interp-orientation {
  font-size: 0.75rem;
  margin-bottom: 8px;
  font-weight: 500;
}

.interp-card .interp-orientation.upright { color: var(--gold); }
.interp-card .interp-orientation.reversed { color: var(--silver); }

.interp-card .interp-meaning {
  font-size: 0.88rem;
  color: var(--text-light);
  line-height: 1.8;
}

.interp-card .interp-keywords {
  font-size: 0.78rem;
  color: var(--sage);
  margin-top: 6px;
  font-style: italic;
}

/* Overall interpretation */
.overall-interp {
  margin-top: 24px;
  padding: 20px;
  background: linear-gradient(135deg, rgba(91,123,93,0.05), rgba(197,165,90,0.05));
  border-radius: 12px;
}

.overall-interp h4 {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 400;
  color: var(--sage);
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.overall-interp p {
  font-size: 0.85rem;
  color: var(--text-light);
  line-height: 1.8;
}

/* ===== Action Buttons ===== */
.action-bar {
  display: flex;
  gap: 16px;
  margin-top: 28px;
  margin-bottom: 40px;
}

.btn {
  font-family: var(--font-body);
  font-size: 0.85rem;
  padding: 10px 28px;
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 1px;
}

.btn-primary {
  background: var(--sage);
  color: white;
  border: none;
}

.btn-primary:hover {
  background: var(--sage-light);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(91,123,93,0.3);
}

.btn-secondary {
  background: transparent;
  color: var(--sage);
  border: 1px solid var(--sage-pale);
}

.btn-secondary:hover {
  border-color: var(--sage);
  background: rgba(91,123,93,0.05);
}

/* ===== Encyclopedia Page ===== */
#encyclopedia {
  max-width: 900px;
  margin: 0 auto;
}

#encyclopedia.active { display: block; }

.ency-header {
  text-align: center;
  margin-bottom: 40px;
}

.ency-header h2 {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 300;
  color: var(--sage);
  letter-spacing: 3px;
}

.ency-header p {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-top: 8px;
}

/* Filter tabs */
.ency-tabs {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 32px;
}

.ency-tab {
  font-family: var(--font-body);
  font-size: 0.8rem;
  padding: 6px 18px;
  border: 1px solid var(--sage-pale);
  border-radius: 20px;
  background: transparent;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 1px;
}

.ency-tab.active, .ency-tab:hover {
  background: var(--sage);
  color: white;
  border-color: var(--sage);
}

/* Search */
.ency-search {
  display: flex;
  justify-content: center;
  margin-bottom: 28px;
}

.ency-search input {
  font-family: var(--font-body);
  font-size: 0.85rem;
  padding: 10px 20px;
  border: 1px solid var(--sage-pale);
  border-radius: 24px;
  background: var(--cream-light);
  color: var(--text);
  width: 320px;
  outline: none;
  transition: border-color 0.3s;
}

.ency-search input:focus {
  border-color: var(--sage-light);
}

.ency-search input::placeholder {
  color: var(--sage-pale);
}

/* Card grid */
.ency-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.ency-card {
  background: var(--cream-light);
  border: 1px solid var(--sage-pale);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.3s;
}

.ency-card:hover {
  border-color: var(--sage-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(91,123,93,0.08);
}

.ency-card .ency-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.ency-card .ency-card-symbol {
  font-size: 1.8rem;
}

.ency-card .ency-card-titles {
  flex: 1;
}

.ency-card .ency-card-name {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 500;
  color: var(--text);
}

.ency-card .ency-card-cn {
  font-size: 0.78rem;
  color: var(--text-light);
}

.ency-card .ency-meanings {
  display: none;
}

.ency-card.expanded .ency-meanings {
  display: block;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--sage-pale);
}

.ency-meaning-section {
  margin-bottom: 10px;
}

.ency-meaning-section .label {
  font-size: 0.72rem;
  letter-spacing: 1px;
  margin-bottom: 3px;
  font-weight: 500;
}

.ency-meaning-section .label.upright { color: var(--gold); }
.ency-meaning-section .label.reversed { color: var(--silver); }

.ency-meaning-section p {
  font-size: 0.82rem;
  color: var(--text-light);
  line-height: 1.7;
}

.ency-meaning-section .keywords {
  font-size: 0.75rem;
  color: var(--sage);
  font-style: italic;
  margin-top: 3px;
}

/* ===== Modal ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}

.modal-overlay.visible {
  display: flex;
}

.modal {
  background: var(--cream-light);
  border-radius: 20px;
  padding: 36px;
  max-width: 480px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.15);
  animation: modalIn 0.4s ease;
}

@keyframes modalIn {
  0% { transform: scale(0.9); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.modal-close {
  float: right;
  background: none;
  border: none;
  font-size: 1.2rem;
  color: var(--text-light);
  cursor: pointer;
}

/* ===== Animations ===== */
@keyframes fadeUp {
  0% { transform: translateY(20px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes gentleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* ===== Responsive ===== */
@media (max-width: 640px) {
  :root {
    --card-width: 110px;
    --card-height: 190px;
  }

  .home-title { font-size: 2.4rem; }
  .spread-choices { gap: 12px; }
  .spread-btn { min-width: 140px; padding: 20px 24px; }
  .card-table { gap: 12px; }
  .interpretation-panel { padding: 20px; }

  nav { padding: 12px 16px; }
  nav .nav-links { gap: 16px; }
  nav .nav-links a { font-size: 0.78rem; }

  .ency-grid { grid-template-columns: 1fr; }
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--sage-pale); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--sage-light); }

/* ===== Draw Pile ===== */
.draw-pile {
  display: flex;
  justify-content: center;
  margin-bottom: 32px;
}

.draw-pile-stack {
  position: relative;
  width: var(--card-width);
  height: var(--card-height);
  cursor: pointer;
  transition: transform 0.3s;
}

.draw-pile-stack:hover {
  transform: translateY(-4px);
}

.draw-pile-card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  background: var(--card-back);
  border: 2px solid var(--sage-light);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.draw-pile-card:nth-child(1) { top: 0; left: 0; }
.draw-pile-card:nth-child(2) { top: -2px; left: 2px; }
.draw-pile-card:nth-child(3) { top: -4px; left: 4px; }

.draw-pile-label {
  text-align: center;
  margin-top: 12px;
  font-size: 0.78rem;
  color: var(--text-light);
}

/* Shuffle animation for the pile */
.draw-pile-stack.shuffling .draw-pile-card:nth-child(1) {
  animation: shufflePile1 0.4s ease infinite alternate;
}
.draw-pile-stack.shuffling .draw-pile-card:nth-child(2) {
  animation: shufflePile2 0.4s ease 0.1s infinite alternate;
}
.draw-pile-stack.shuffling .draw-pile-card:nth-child(3) {
  animation: shufflePile3 0.4s ease 0.2s infinite alternate;
}

@keyframes shufflePile1 {
  0% { transform: translateX(-8px) rotate(-3deg); }
  100% { transform: translateX(8px) rotate(3deg); }
}
@keyframes shufflePile2 {
  0% { transform: translateX(6px) rotate(2deg); }
  100% { transform: translateX(-6px) rotate(-2deg); }
}
@keyframes shufflePile3 {
  0% { transform: translateX(-4px) rotate(-1deg); }
  100% { transform: translateX(4px) rotate(1deg); }
}

/* ===== Footer ===== */
footer {
  text-align: center;
  padding: 32px;
  font-size: 0.72rem;
  color: var(--sage-pale);
  letter-spacing: 2px;
  font-family: var(--font-display);
}
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <div class="logo" onclick="showPage('home')">
    苏堤柳塔罗
    <span>WILLOW TAROT</span>
  </div>
  <div class="nav-links">
    <a onclick="showPage('home')">抽牌</a>
    <a onclick="showPage('encyclopedia')">牌义</a>
  </div>
</nav>

<!-- Home Page -->
<div id="home" class="page active">
  <h1 class="home-title">苏堤柳塔罗</h1>
  <p class="home-subtitle">WILLOW TAROT</p>
  <p class="home-desc">
    静心片刻，选择你的牌阵<br>
    让柳枝为你拂开迷雾
  </p>

const ALL_CARDS = [...MAJOR_ARCANA, ...WANDS, ...CUPS, ...SWORDS, ...PENTACLES];

// ============================================================
// SPREAD DEFINITIONS
// ============================================================
const SPREADS = {
  1: { name: '单张抽牌', labels: ['启示'] },
  3: { name: '时光之流', labels: ['过去', '现在', '未来'] },
  5: { name: '五芒启示', labels: ['现况', '障碍', '建议', '环境', '结果'] }
};

// ============================================================
// STATE
// ============================================================
let currentSpread = 3;
let drawnCards = [];
let flippedCount = 0;
let isDrawing = false;
let shuffledDeck = [];

// ============================================================
// PAGE NAVIGATION
// ============================================================
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  window.scrollTo(0, 0);
  if (pageId === 'encyclopedia') renderEncyclopedia();
}

// ============================================================
// READING LOGIC
// ============================================================
function shuffleDeck() {
  shuffledDeck = [...ALL_CARDS];
  for (let i = shuffledDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffledDeck[i], shuffledDeck[j]] = [shuffledDeck[j], shuffledDeck[i]];
  }
}

function startReading(count) {
  currentSpread = count;
  drawnCards = [];
  flippedCount = 0;
  isDrawing = false;
  shuffleDeck();

  const spread = SPREADS[count];
  document.getElementById('readingTitle').textContent = spread.name;
  document.getElementById('readingHint').textContent = '点击牌堆抽牌';

  // Build card slots
  const table = document.getElementById('cardTable');
  table.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.innerHTML = `
      <div class="slot-label">${spread.labels[i]}</div>
      <div class="card-container waiting" id="cardSlot${i}">
        <div class="card-inner" id="cardInner${i}">
          <div class="card-face card-back">
            <div class="card-back-pattern"></div>
          </div>
          <div class="card-face card-front" id="cardFront${i}"></div>
        </div>
      </div>
    `;
    table.appendChild(slot);
  }

  // Reset interpretation
  document.getElementById('interpPanel').classList.remove('visible');
  document.getElementById('interpContent').innerHTML = '';

  // Show draw pile
  document.getElementById('drawPile').style.display = 'flex';

  // Shuffle animation
  const pileStack = document.getElementById('drawPileStack');
  pileStack.classList.add('shuffling');
  setTimeout(() => pileStack.classList.remove('shuffling'), 1200);

  showPage('reading');
}

function drawNextCard() {
  if (isDrawing || drawnCards.length >= currentSpread) return;
  isDrawing = true;

  const idx = drawnCards.length;
  const card = shuffledDeck[idx];
  const isReversed = Math.random() < 0.4; // 40% chance reversed

  drawnCards.push({ card, isReversed });

  const container = document.getElementById(`cardSlot${idx}`);
  container.classList.remove('waiting');
  container.classList.add('drawing');

  // Set up card front
  const front = document.getElementById(`cardFront${idx}`);
  front.className = `card-face card-front ${isReversed ? 'reversed' : ''}`;
  front.innerHTML = `
    <div class="card-numeral">${card.numeral}</div>
    <div class="card-symbol" ${isReversed ? 'style="transform:rotate(180deg)"' : ''}>${card.symbol}</div>
    <div class="card-name-en">${card.nameEn}</div>
    <div class="card-name-cn">${card.nameCn}</div>
    <div class="card-orientation ${isReversed ? 'reversed-tag' : 'upright'}">
      ${isReversed ? '逆 位' : '正 位'}
    </div>
  `;

  // Click to flip
  container.onclick = () => flipCard(idx);

  setTimeout(() => {
    isDrawing = false;
    // Update hint
    if (drawnCards.length < currentSpread) {
      document.getElementById('readingHint').textContent = `已抽 ${drawnCards.length}/${currentSpread} 张，继续点击牌堆`;
    } else {
      document.getElementById('readingHint').textContent = '点击牌面翻牌查看';
      document.getElementById('drawPile').style.display = 'none';
    }
  }, 600);
}

function flipCard(idx) {
  const inner = document.getElementById(`cardInner${idx}`);
  if (inner.classList.contains('flipped')) return;
  if (idx >= drawnCards.length) return; // Not drawn yet

  inner.classList.add('flipped');
  flippedCount++;

  if (flippedCount === currentSpread) {
    setTimeout(() => showInterpretation(), 600);
  } else {
    document.getElementById('readingHint').textContent =
      `已翻 ${flippedCount}/${currentSpread} 张，继续点击未翻的牌`;
  }
}

function showInterpretation() {
  document.getElementById('readingHint').textContent = '✦ 解读完成 ✦';

  const panel = document.getElementById('interpPanel');
  const content = document.getElementById('interpContent');
  const spread = SPREADS[currentSpread];

  let html = '';
  drawnCards.forEach((drawn, i) => {
    const { card, isReversed } = drawn;
    const meaning = isReversed ? card.reversed : card.upright;
    html += `
      <div class="interp-card">
        <div class="interp-position">${spread.labels[i]}</div>
        <div class="interp-name">${card.symbol} ${card.nameEn} · ${card.nameCn}</div>
        <div class="interp-orientation ${isReversed ? 'reversed' : 'upright'}">
          ${isReversed ? '◇ 逆位' : '◆ 正位'}
        </div>
        <div class="interp-meaning">${meaning.meaning}</div>
        <div class="interp-keywords">${meaning.keywords}</div>
      </div>
    `;
  });

  // Overall interpretation
  html += `
    <div class="overall-interp">
      <h4>✦ 整体启示</h4>
      <p>${generateOverall()}</p>
    </div>
  `;

  content.innerHTML = html;
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function generateOverall() {
  const majorCount = drawnCards.filter(d => d.card.suit === 'major').length;
  const reversedCount = drawnCards.filter(d => d.isReversed).length;
  const suits = drawnCards.map(d => d.card.suit).filter(s => s !== 'major');

  let parts = [];

  if (majorCount > 0) {
    parts.push(`本次牌阵中出现了${majorCount}张大阿尔卡那，暗示着重要的人生课题和深层的力量在运作。`);
  }

  if (reversedCount === 0) {
    parts.push('所有牌均为正位，整体能量是积极向前的。');
  } else if (reversedCount === drawnCards.length) {
    parts.push('所有牌均为逆位，这是内在审视和调整的时期，需要耐心对待自己。');
  } else if (reversedCount > drawnCards.length / 2) {
    parts.push('逆位牌较多，提示目前可能面临一些内在的阻碍或需要重新审视的方面。');
  }

  const suitMessages = {
    wands: '权杖元素带来行动力和创造的热情',
    cups: '圣杯元素关注情感和内心世界',
    swords: '宝剑元素指向思维和需要面对的真相',
    pentacles: '星币元素关注物质层面和务实的行动'
  };

  const uniqueSuits = [...new Set(suits)];
  if (uniqueSuits.length > 0) {
    const suitDesc = uniqueSuits.map(s => suitMessages[s]).join('；');
    parts.push(suitDesc + '。');
  }

  parts.push('请结合自身情况，用心感受每张牌传递的信息。塔罗是镜子，映照的是你内心已有的答案。');

  return parts.join('');
}

function reshuffleReading() {
  startReading(currentSpread);
}

// ============================================================
// ENCYCLOPEDIA
// ============================================================
let encyFilter = 'all';

function renderEncyclopedia() {
  const grid = document.getElementById('encyGrid');
  const search = document.getElementById('encySearch').value.toLowerCase();

  let cards = ALL_CARDS;

  if (encyFilter !== 'all') {
    cards = cards.filter(c => c.suit === encyFilter);
  }

  if (search) {
    cards = cards.filter(c =>
      c.nameEn.toLowerCase().includes(search) ||
      c.nameCn.includes(search) ||
      c.upright.keywords.includes(search) ||
      c.reversed.keywords.includes(search)
    );
  }

  grid.innerHTML = cards.map(card => `
    <div class="ency-card" onclick="this.classList.toggle('expanded')">
      <div class="ency-card-header">
        <span class="ency-card-symbol">${card.symbol}</span>
        <div class="ency-card-titles">
          <div class="ency-card-name">${card.nameEn}</div>
          <div class="ency-card-cn">${card.nameCn} ${card.numeral ? '· ' + card.numeral : ''}</div>
        </div>
      </div>
      <div class="ency-meanings">
        <div class="ency-meaning-section">
          <div class="label upright">◆ 正位</div>
          <p>${card.upright.meaning}</p>
          <div class="keywords">${card.upright.keywords}</div>
        </div>
        <div class="ency-meaning-section">
          <div class="label reversed">◇ 逆位</div>
          <p>${card.reversed.meaning}</p>
          <div class="keywords">${card.reversed.keywords}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function filterEncyclopedia() {
  renderEncyclopedia();
}

// Tab clicks
document.getElementById('encyTabs').addEventListener('click', (e) => {
  if (e.target.classList.contains('ency-tab')) {
    document.querySelectorAll('.ency-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    encyFilter = e.target.dataset.filter;
    renderEncyclopedia();
  }
});

// ============================================================
// INIT
// ============================================================
shuffleDeck();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}
