name: Build Roost APK

on:
  push:
    branches: [main]
    paths:
      - 'roost-app/**'
      - '.github/workflows/roost-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install deps
        working-directory: roost-app
        run: npm install

      - name: Add android platform
        working-directory: roost-app
        run: npx cap add android

      - name: Sync
        working-directory: roost-app
        run: npx cap sync android

      - name: Build debug APK
        working-directory: roost-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: roost-apk
          name: 归巢 APK（自用）
          body: |
            归巢 Android 自用包（在线壳，内容始终是线上最新）。
            手机点下面的 app-debug.apk 下载安装，需允许「未知来源」。
          files: roost-app/android/app/build/outputs/apk/debug/app-debug.apk
