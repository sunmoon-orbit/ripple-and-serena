name: Build Yanji

on:
  push:
    branches: [main]
    paths:
      - 'yanji-src/**'
      - '.github/workflows/yanji-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: yanji-src/package.json

      - name: Install dependencies
        working-directory: yanji-src
        run: npm install

      - name: Build
        working-directory: yanji-src
        run: npm run build

      - name: Commit build output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f yanji/
          git diff --cached --quiet || git commit -m "chore: build yanji [skip ci]"
          git push
